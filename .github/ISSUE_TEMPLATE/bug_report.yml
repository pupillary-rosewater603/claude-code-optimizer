name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly
      placeholder: "When I run /commit, it..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: "I expected it to..."
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
        - WSL
    validations:
      required: true
  - type: dropdown
    id: install-method
    attributes:
      label: Install Method
      options:
        - npm
        - curl
        - PowerShell
        - Manual
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "Run: npm list -g claude-code-optimizer"
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Skill
        - Rule
        - Hook
        - CLI / Installer
        - Settings
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error output / logs
      render: shell
