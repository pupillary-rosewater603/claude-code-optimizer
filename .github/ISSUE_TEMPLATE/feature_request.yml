name: Feature Request
description: Suggest a new skill, rule, hook, or improvement
labels: ["enhancement"]
body:
  - type: dropdown
    id: type
    attributes:
      label: What type of feature?
      options:
        - New Skill
        - New Rule
        - New Hook
        - New Stack Example
        - Improvement to Existing Feature
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the feature
      placeholder: "I want a skill that..."
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: When would you use this?
      placeholder: "When I'm working on..."
    validations:
      required: true
  - type: textarea
    id: example
    attributes:
      label: Example (optional)
      description: How would you invoke it? What would the output look like?
      placeholder: "/my-skill src/api/"
